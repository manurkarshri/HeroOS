<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#020617">
<title>HERO OS Core</title>

<style>
:root{
  --bg:#020617;
  --panel:#0f172a;
  --panel2:#111827;
  --line:#263247;
  --text:#eef2ff;
  --muted:#94a3b8;
  --blue:#38bdf8;
  --green:#22c55e;
  --red:#ef4444;
  --orange:#f59e0b;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:
    radial-gradient(circle at top,#123155 0%,transparent 35%),
    radial-gradient(circle at bottom,#1e1b4b 0%,transparent 35%),
    #020617;
  color:var(--text);
}

.app{
  max-width:520px;
  margin:auto;
  min-height:100vh;
  padding:18px;
  padding-bottom:90px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
}

.logo h1{
  margin:0;
  letter-spacing:2px;
  font-size:30px;
}

.logo p{
  margin:4px 0 0;
  color:var(--muted);
  font-size:13px;
}

.badge{
  color:var(--blue);
  border:1px solid rgba(56,189,248,.45);
  background:rgba(56,189,248,.12);
  padding:8px 12px;
  border-radius:999px;
  font-size:12px;
}

.card{
  background:linear-gradient(145deg,rgba(15,23,42,.96),rgba(17,24,39,.96));
  border:1px solid var(--line);
  border-radius:24px;
  padding:16px;
  margin-bottom:14px;
  box-shadow:0 20px 45px rgba(0,0,0,.28);
}

.face-card{
  text-align:center;
  padding:24px 16px;
  background:
    radial-gradient(circle at center,rgba(56,189,248,.18),transparent 55%),
    linear-gradient(145deg,#020617,#0f172a);
}

.face{
  width:190px;
  height:190px;
  margin:8px auto 18px;
  border-radius:50%;
  border:2px solid rgba(56,189,248,.6);
  position:relative;
  box-shadow:
    0 0 25px rgba(56,189,248,.35),
    inset 0 0 35px rgba(56,189,248,.18);
  animation:pulse 3s infinite;
}

.face::before{
  content:"";
  position:absolute;
  inset:25px;
  border-radius:50%;
  border:1px dashed rgba(56,189,248,.45);
  animation:spin 12s linear infinite;
}

.eye{
  width:34px;
  height:16px;
  background:var(--blue);
  border-radius:999px;
  position:absolute;
  top:72px;
  box-shadow:0 0 18px var(--blue);
}

.eye.left{left:48px}
.eye.right{right:48px}

.mouth{
  width:70px;
  height:10px;
  background:var(--blue);
  border-radius:999px;
  position:absolute;
  left:50%;
  bottom:55px;
  transform:translateX(-50%);
  box-shadow:0 0 18px var(--blue);
}

.status{
  color:var(--green);
  font-size:13px;
}

@keyframes pulse{
  0%,100%{box-shadow:0 0 20px rgba(56,189,248,.25), inset 0 0 30px rgba(56,189,248,.14)}
  50%{box-shadow:0 0 45px rgba(56,189,248,.55), inset 0 0 45px rgba(56,189,248,.25)}
}

@keyframes spin{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}

h2{margin:0 0 10px;font-size:18px}
p{color:var(--muted);line-height:1.45}

textarea,input,select{
  width:100%;
  background:#020617;
  border:1px solid var(--line);
  color:var(--text);
  border-radius:16px;
  padding:13px;
  font-size:15px;
  margin:6px 0;
}

textarea{
  min-height:120px;
  resize:vertical;
}

button{
  border:0;
  border-radius:16px;
  padding:13px 14px;
  font-weight:800;
  font-size:14px;
  background:var(--blue);
  color:#00111f;
}

button.secondary{
  background:#1f2937;
  color:var(--text);
  border:1px solid var(--line);
}

.row{
  display:flex;
  gap:8px;
}

.row button{flex:1}

.response{
  background:#020617;
  border:1px solid var(--line);
  border-radius:18px;
  padding:14px;
  white-space:pre-wrap;
  min-height:130px;
  color:#dbeafe;
}

.log{
  font-size:13px;
  color:var(--muted);
  border-top:1px solid var(--line);
  padding-top:10px;
  margin-top:10px;
}

.nav{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  max-width:520px;
  width:100%;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  background:rgba(2,6,23,.97);
  border-top:1px solid var(--line);
  padding:8px;
}

.nav button{
  background:transparent;
  color:var(--muted);
  font-size:12px;
}

.nav button.active{color:var(--blue)}

.page{display:none}
.page.active{display:block}

.small{font-size:12px;color:var(--muted)}
</style>
</head>

<body>
<div class="app">

  <div class="header">
    <div class="logo">
      <h1>HERO</h1>
      <p>Personal AI Command System</p>
    </div>
    <div class="badge">Core v2.0</div>
  </div>

  <section id="core" class="page active">
    <div class="card face-card">
      <div class="face">
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="mouth"></div>
      </div>
      <div class="status" id="heroStatus">HERO online • Awaiting command</div>
    </div>

    <div class="card">
      <h2>Command HERO</h2>
      <p class="small">Use iPhone keyboard dictation mic, or type your command below.</p>
      <textarea id="command" placeholder="Example: Hero, I bought half kg potato at 40 per kg, 2 kg tomato at 10 per kg and 3 kg onion at 15 per kg. Calculate my bill."></textarea>
      <div class="row">
        <button onclick="processCommand()">Activate HERO</button>
        <button class="secondary" onclick="clearCommand()">Clear</button>
      </div>
    </div>

    <div class="card">
      <h2>HERO Response</h2>
      <div id="response" class="response">Ready.</div>
    </div>
  </section>

  <section id="planner" class="page">
    <div class="card">
      <h2>Discipline Planner</h2>
      <input id="taskInput" placeholder="Add task or routine">
      <button onclick="addTask()">Add</button>
      <div id="taskList"></div>
    </div>
  </section>

  <section id="memory" class="page">
    <div class="card">
      <h2>HERO Memory</h2>
      <textarea id="memoryBox" placeholder="Store your goals, routines, office location, preferences, important notes..."></textarea>
      <button onclick="saveMemory()">Save Memory</button>
    </div>

    <div class="card">
      <h2>Command History</h2>
      <div id="history"></div>
    </div>
  </section>

</div>

<nav class="nav">
  <button class="active" onclick="showPage('core',this)">HERO</button>
  <button onclick="showPage('planner',this)">Planner</button>
  <button onclick="showPage('memory',this)">Memory</button>
</nav>

<script>
const storeKey="heroCoreV20";

let data=JSON.parse(localStorage.getItem(storeKey))||{
  memory:"",
  tasks:[],
  history:[]
};

function save(){
  localStorage.setItem(storeKey,JSON.stringify(data));
  render();
}

function showPage(id,btn){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

function clearCommand(){
  document.getElementById("command").value="";
  document.getElementById("response").innerText="Ready.";
}

function processCommand(){
  const cmd=document.getElementById("command").value.trim();
  if(!cmd){
    alert("Please enter or dictate a command.");
    return;
  }

  document.getElementById("heroStatus").innerText="HERO analysing...";
  let reply=analyseCommand(cmd);

  document.getElementById("response").innerText=reply;
  document.getElementById("heroStatus").innerText="HERO online • Response ready";

  data.history.unshift({
    date:new Date().toLocaleString(),
    command:cmd,
    response:reply
  });

  data.history=data.history.slice(0,20);
  save();
}

function analyseCommand(cmd){
  const text=cmd.toLowerCase();

  if(text.includes("calculate") || text.includes("bill") || text.includes("kg") || text.includes("per kg")){
    return calculateBill(cmd);
  }

  if(text.includes("office") || text.includes("traffic") || text.includes("weather") || text.includes("route")){
    return `I understand this as a travel safety and timing request.

To answer perfectly, I need live access to:
1. Your current location
2. Office location
3. Weather around your travel time
4. Traffic and route conditions
5. Road closure/diversion/protest information

Current HERO Core v2.0 cannot yet access live traffic/weather APIs.

Recommended next upgrade:
HERO v2.1 = live location + weather check
HERO v2.2 = maps/traffic integration

For now, my guidance:
- Check weather before leaving
- Avoid peak congestion time if possible
- Keep 15–30 minutes buffer
- If rain or heavy traffic is expected, leave earlier or delay slightly depending on urgency.`;
  }

  if(text.includes("health") || text.includes("medical") || text.includes("medicine")){
    return `I understand this as a health/medical question.

I can help explain general health information, symptoms, lifestyle, and questions to ask a doctor.

Important:
I cannot replace a qualified doctor, emergency care, or diagnosis.

Please describe:
1. Age
2. Symptoms
3. Duration
4. Medicines taken
5. Any existing condition

Then I can help you structure the next safe step.`;
  }

  if(text.includes("plan") || text.includes("organise") || text.includes("organize")){
    return `Command understood: planning and organisation.

Suggested structure:
1. Define the goal
2. Break it into small actions
3. Decide priority
4. Assign date/time
5. Track completion
6. Review at end of day

Tell me the goal, deadline, and constraints. I will convert it into an action plan.`;
  }

  return `Command received.

I understand you need help with:
"${cmd}"

Current HERO Core can:
- calculate simple bills
- structure plans
- guide decisions
- prepare safety/travel reasoning
- store memory and tasks

For deeper intelligence, this should be sent to the AI brain in the next version.

Suggested next action:
Convert this command into a clear AI request and ask ChatGPT, or wait for HERO AI integration in the next upgrade.`;
}

function calculateBill(cmd){
  let text=cmd.toLowerCase();

  text=text.replace(/half kg/g,"0.5 kg");
  text=text.replace(/half kilo/g,"0.5 kg");
  text=text.replace(/one kg/g,"1 kg");
  text=text.replace(/two kg/g,"2 kg");
  text=text.replace(/three kg/g,"3 kg");
  text=text.replace(/four kg/g,"4 kg");
  text=text.replace(/five kg/g,"5 kg");

  const pattern=/(\d+(\.\d+)?)\s*kg\s+([a-zA-Z]+).*?(\d+)\s*(?:per kg|\/kg|kg)/g;
  let match;
  let total=0;
  let lines=[];

  while((match=pattern.exec(text))!==null){
    const qty=parseFloat(match[1]);
    const item=match[3];
    const rate=parseFloat(match[4]);
    const cost=qty*rate;
    total+=cost;
    lines.push(`${capitalize(item)}: ${qty} kg × ₹${rate}/kg = ₹${cost}`);
  }

  if(lines.length===0){
    return `I tried to calculate the bill, but I could not clearly detect item, quantity, and rate.

Try this format:
0.5 kg potato at 40 per kg
2 kg tomato at 10 per kg
3 kg onion at 15 per kg`;
  }

  return `Bill calculation completed:

${lines.join("\n")}

Total amount to pay: ₹${total}

Please verify weights and rates before paying.`;
}

function capitalize(s){
  return s.charAt(0).toUpperCase()+s.slice(1);
}

function addTask(){
  const input=document.getElementById("taskInput");
  const text=input.value.trim();
  if(!text)return;
  data.tasks.push({id:Date.now(),text,done:false});
  input.value="";
  save();
}

function toggleTask(id){
  data.tasks=data.tasks.map(t=>t.id===id?{...t,done:!t.done}:t);
  save();
}

function deleteTask(id){
  data.tasks=data.tasks.filter(t=>t.id!==id);
  save();
}

function saveMemory(){
  data.memory=document.getElementById("memoryBox").value;
  save();
  alert("HERO memory saved.");
}

function render(){
  document.getElementById("memoryBox").value=data.memory||"";

  const taskList=document.getElementById("taskList");
  taskList.innerHTML=data.tasks.length?"":"<p>No tasks yet.</p>";
  data.tasks.forEach(t=>{
    const div=document.createElement("div");
    div.className="log";
    div.innerHTML=`
      <input type="checkbox" ${t.done?"checked":""} onchange="toggleTask(${t.id})">
      ${t.done?"<s>"+t.text+"</s>":t.text}
      <button class="secondary" onclick="deleteTask(${t.id})" style="float:right;padding:6px 10px">×</button>
    `;
    taskList.appendChild(div);
  });

  const history=document.getElementById("history");
  history.innerHTML=data.history.length?"":"<p>No command history yet.</p>";
  data.history.forEach(h=>{
    const div=document.createElement("div");
    div.className="log";
    div.innerHTML=`<strong>${h.date}</strong><br>${h.command}<br><br><span style="color:#dbeafe">${h.response}</span>`;
    history.appendChild(div);
  });
}

render();
</script>
</body>
</html>
